<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz game</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question goes here</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question"></span> of <span>5</span>
                    </p>
                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>

          <div id="answer-container" class="answer-container">
            <!-- amswer button will be insterted here from our js code later at some point  -->
          </div>  
          <div class="progress-bar">
            <div id="progress" class="progress"></div>

          </div>
        </div>

        <div id="result-screen" class="screen">
        <h1>Quiz results</h1>
        <div class="result-info">
            <p>you scored <span id="final-score"></span> out of <span id="max-score">5</span></p>

            <div id="result-massage">good job</div>
        </div>
        <button id="restart-btn">restart Quiz</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
